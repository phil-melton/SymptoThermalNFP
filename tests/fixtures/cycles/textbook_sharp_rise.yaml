# Textbook sharp-rise cycle (Celsius)
# Tests: Standard 3-over-6 rule + peak day detection
# Sensiplan rules: Spec SS4.1 (3-over-6), SS4.2 (peak day), SS4.3 (double-check)
#
# Cycle: 28 days. Clear temp shift on day 15 with sharp rise.
# Mucus peak on day 14 (last slippery day before drying).
# Temp rule satisfied evening of day 17 (3rd high day).
# Peak rule satisfied evening of day 17 (3rd dry day after peak).
# Both rules satisfied same day -> S2 starts day 18.
# v1 conservative MVP: all pre-ov days are S1 (fertile).

