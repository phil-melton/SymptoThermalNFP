# First-cycle case
# Tests: Spec SS3 first-cycle rule and v1 conservative MVP.
# For a user's very first charted cycle, no pre-ovulatory infertile days.
# In v1 conservative MVP, ALL pre-ov days are S1 regardless (same effect).
# This fixture verifies that menses days are NOT marked S0 when there's no
# prior confirmed cycle.

name: "First cycle (no prior data)"
description: "No prior cycles means no pre-ov infertile days; all days S1 until S2"

settings:
  temperature_unit: celsius

prior_cycles: []

observations:
  - { date: "2024-08-01", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: heavy }
  - { date: "2024-08-02", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: heavy }
  - { date: "2024-08-03", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: medium }
  - { date: "2024-08-04", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: light }
  - { date: "2024-08-05", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-08-06", temperature: 36.1, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-08-07", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: sticky } }
  - { date: "2024-08-08", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: creamy } }
  - { date: "2024-08-09", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: watery } }
  - { date: "2024-08-10", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: slippery } }
  - { date: "2024-08-11", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: slippery } }
  - { date: "2024-08-12", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: sticky } }
  - { date: "2024-08-13", temperature: 36.7, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-08-14", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-08-15", temperature: 36.7, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-08-16", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: dry } }

expected:
  t_shift_day: 12
  coverline_celsius: 36.3
  peak_day: 11
  temp_confirmed_day: 14
  peak_confirmed_day: 14
  infertile_from_day: 15
  slow_rise_applied: false
  drop_back_applied: false
  disqualifiers: []
  # ALL days before S2 are fertile (S1). Menses days are NOT S0.
  states:
    - fertile        # day 1 (menses, but first cycle -> S1)
    - fertile        # day 2
    - fertile        # day 3
    - fertile        # day 4
    - fertile        # day 5
    - fertile        # day 6
    - fertile        # day 7
    - fertile        # day 8
    - fertile        # day 9
    - fertile        # day 10
    - fertile        # day 11 (peak)
    - fertile        # day 12 (1st high)
    - fertile        # day 13 (2nd high)
    - fertile        # day 14 (3rd high, confirmed evening)
    - post_ov_infertile  # day 15
    - post_ov_infertile  # day 16
