# Disturbed-temperature cycle
# Tests: Spec SS4.1.1 - disturbed temps are skipped when counting the 6 lows
#   and when evaluating the 3 highs. Spec SS4.1 step 6.

name: "Disturbed-temperature cycle"
description: "Multiple disturbed temps are skipped; shift still found from valid temps"

settings:
  temperature_unit: celsius

prior_cycles: []

observations:
  - { date: "2024-04-01", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: heavy }
  - { date: "2024-04-02", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: dry }, bleeding: medium }
  # Day 3: disturbed (fever/illness). Excluded from 6 lows.
  - { date: "2024-04-03", temperature: 37.0, temperature_unit: celsius, temperature_disturbed: true, fluid: { sensation: dry }, bleeding: light }
  - { date: "2024-04-04", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-04-05", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: dry } }
  # Day 6: disturbed. Excluded.
  - { date: "2024-04-06", temperature: 36.9, temperature_unit: celsius, temperature_disturbed: true, fluid: { sensation: dry } }
  - { date: "2024-04-07", temperature: 36.1, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-04-08", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: sticky } }
  - { date: "2024-04-09", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: creamy } }
  - { date: "2024-04-10", temperature: 36.2, temperature_unit: celsius, fluid: { sensation: watery } }
  # Day 11: peak day (last slippery)
  - { date: "2024-04-11", temperature: 36.3, temperature_unit: celsius, fluid: { sensation: slippery } }
  # Day 12: 1st high. 6 preceding valid (skip days 3, 6):
  # Valid temps going back from day 11: 36.3(d11), 36.2(d10), 36.3(d9), 36.2(d8), 36.1(d7), 36.3(d5)
  # Coverline = max(36.3, 36.2, 36.3, 36.2, 36.1, 36.3) = 36.3
  # Day 12: 36.6 > 36.3
  - { date: "2024-04-12", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: sticky } }
  # Day 13: 2nd high. 36.7 > 36.3
  - { date: "2024-04-13", temperature: 36.7, temperature_unit: celsius, fluid: { sensation: dry } }
  # Day 14: 3rd high. 36.6 >= 36.3 + 0.2 = 36.5. Confirmed evening of day 14.
  - { date: "2024-04-14", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: dry } }
  # Peak confirmed evening of day 14 (3 days after peak day 11).
  # Both confirmed day 14 -> S2 starts day 15.
  - { date: "2024-04-15", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-04-16", temperature: 36.5, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-04-17", temperature: 36.6, temperature_unit: celsius, fluid: { sensation: dry } }
  - { date: "2024-04-18", temperature: 36.5, temperature_unit: celsius, fluid: { sensation: dry } }

